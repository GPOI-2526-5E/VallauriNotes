<div class="signup-container">
  <div class="signup-card">
    <h2>Crea il tuo account VallauriNotes!</h2>
    
    <form action="#">
      <div class="form-row">
        <div class="input-group">
          <label for="nome">Nome</label>
          <input type="text" id="nome" placeholder="Il tuo nome" required>
        </div>
        <div class="input-group">
          <label for="cognome">Cognome</label>
          <input type="text" id="cognome" placeholder="Il tuo cognome" required>
        </div>
      </div>

      <div class="form-row">
        <div class="input-group">
          <label for="classe">Classe</label>
          <select id="classe" required>
            <option value="" disabled selected>Scegli...</option>
            <option value="1">1ª</option>
            <option value="2">2ª</option>
            <option value="3">3ª</option>
            <option value="4">4ª</option>
            <option value="5">5ª</option>
          </select>
        </div>
        
        <div class="input-group">
          <label for="sezione">Sezione</label>
          <select id="sezione" required>
            <option value="" disabled selected>Scegli...</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            </select>
        </div>

        <div class="input-group">
          <label for="settore">Settore</label>
          <select id="settore" required>
            <option value="" disabled selected>Scegli...</option>
            <option value="informatica">Informatica</option>
            <option value="meccanica">Meccanica</option>
            <option value="elettronica">Elettronica</option>
            </select>
        </div>
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="La tua email scolastica o personale" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Scegli una password sicura" required>
      </div>

      <button type="submit" class="submit-btn">Registrati</button>
    </form>

    <p class="login-link">Hai già un account? <a routerLink="/login">Accedi qui</a></p>
  </div>
</div>
