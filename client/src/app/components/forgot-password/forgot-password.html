<div class="forgot-container">
  <div class="forgot-card">
    <h2>Recupera Password</h2>
    <p class="subtitle">Inserisci la tua email e ti invieremo le istruzioni per reimpostare la tua password.</p>
    
    <form action="#">
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="La tua email" required>
      </div>

      <button type="submit" class="submit-btn">Invia link di recupero</button>
    </form>

    <p class="login-link"><a routerLink="/login">Torna al Login</a></p>
  </div>
</div>
